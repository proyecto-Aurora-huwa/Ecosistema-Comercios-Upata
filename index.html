<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema de Comercios Upata - Alianza Aurora</title>
    <style>
        /* Fondo negro total para toda la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Encabezado elegante */
        header {
            width: 100%;
            padding: 40px 0;
            background-color: #000000;
            text-align: center;
            border-bottom: 2px solid #FFD700; /* Línea dorada sutil */
        }

        /* Contenedor del banner mediano */
        .container-banner {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        /* Ajuste del banner a tamaño mediano */
        .banner-img {
            width: 70%; /* Tamaño mediano */
            max-width: 800px; /* Límite de ancho para que no sea gigante */
            height: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(255, 214, 0, 0.3); /* Resplandor dorado */
            border: 1px solid #333;
        }

        h1 {
            font-size: 2.5em;
            color: #ffffff;
            margin-top: 20px;
        }

        .subtitulo {
            font-size: 1.5em;
            color: #FFD700; /* Dorado Huwa */
            font-weight: bold;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin: 0; letter-spacing: 4px; color: #ffffff;">ALIANZA AURORA</h2>
    </header>

    <div class="container-banner">
        <img src="banner-"Ecosistema de Comercios Upata.jpg" 
             alt="Ecosistema de Comercios Upata" 
             class="banner-img">
    </div>

    <h1>Ecosistema de Comercios Upata</h1>
    <p class="subtitulo">Impulsado por Proyecto Aurora</p>

</body>
</html>
